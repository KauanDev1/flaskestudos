<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <title>Contato</title>
</head>
<body>
    <div class="Formulario">
        <h3>Envio de contato</h3>

        <form method="post" class="formulario">
            {{ form.csrf_token }}

            <div class="campo">
                {{ form.nome.label() }}
                {{ form.nome() }}
            </div>

            <div class="campo">
                {{ form.email.label() }}
                {{ form.email() }}
            </div>

            <div class="campo">
                {{ form.assunto.label() }}
                {{ form.assunto() }}
            </div>

            <div class="campo">
                {{ form.mensagem.label() }}
                {{ form.mensagem() }}
            </div>


            <div class="campo">
                {{ form.btnSubmit() }}
            </div>
        </form>

    </div>
</body>
</html>
